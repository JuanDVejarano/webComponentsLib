<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
  <title>Stencil Component Starter</title>

  <script type="module" src="/build/webcomponentslib.esm.js"></script>
  <script nomodule src="/build/webcomponentslib.js"></script>
</head>

<body>

  <h3>Butons filled</h3>
  <div>
    <lib-button btn-type="primary" btn-size="large">Large Button</lib-button>
    <lib-button btn-type="primary" btn-size="large" disabled="true">disabled Button</lib-button>
    <lib-button btn-type="primary" btn-size="medium">medium Button</lib-button>
    <lib-button btn-type="primary" btn-size="small">Small Button</lib-button>
  </div>
  <div>
    <lib-button btn-type="secondary">Large Button</lib-button>
    <lib-button btn-type="secondary" disabled="true">disabled Button</lib-button>
    <lib-button btn-type="secondary" btn-size="medium">medium Button</lib-button>
    <lib-button btn-type="secondary" btn-size="small">Small Button</lib-button>
  </div>
  <div>
    <lib-button btn-type="neutral">Large Button</lib-button>
    <lib-button btn-type="neutral" disabled="true">disabled Button</lib-button>
    <lib-button btn-type="neutral" btn-size="medium">medium Button</lib-button>
    <lib-button btn-type="neutral" btn-size="small">Small Button</lib-button>
  </div>

  <h3>Butons Ghost</h3>
  <div>
    <lib-button btn-type="primary" btn-size="large" btn-category="ghost">Large Button</lib-button>
    <lib-button btn-type="primary" btn-size="large" btn-category="ghost" disabled="true">disabled Button</lib-button>
    <lib-button btn-type="primary" btn-size="medium" btn-category="ghost">medium Button</lib-button>
    <lib-button btn-type="primary" btn-size="small" btn-category="ghost">Small Button</lib-button>
  </div>
</body>

</html>
